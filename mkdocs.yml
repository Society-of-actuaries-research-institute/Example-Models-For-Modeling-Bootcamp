site_name: MBC Production Model
site_description: Production-quality actuarial cash flow model illustration for the SOA Modeling Bootcamp

docs_dir: docs
use_directory_urls: false

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - Actuarial Calculations: calculations.md
  - Install & Run: install-run.md
  - Inputs & Outputs: inputs-outputs.md
  - Governance & Limitations: governance-limitations.md
  - Testing & Sign-Offs: testing-signoffs.md
  - License: license.md
  - API Reference:
      - Data Models: api/models.md
      - Excel Loader: api/loader.md
      - Mortality Engine: api/mortality.md
      - Projection Engine: api/projection.md
      - Report Writer: api/writer.md
      - Runner: api/runner.md
